<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Jugadores - AlexPHGPDS</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos para el apartado de jugadores */
        .players-section {
            background-color: #2c2f33;
            padding: 40px;
            color: #fff;
        }
        .players-section h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #f39c12;
        }
        .player-list {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .player-card {
            background-color: #23272a;
            border: 2px solid #f39c12;
            border-radius: 8px;
            padding: 20px;
            margin: 10px;
            width: 60%;
            text-align: center;
        }
        .player-card h3 {
            margin: 0;
            color: #f39c12;
        }
        .player-card p {
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <!-- Encabezado -->
    <header>
        <div class="container">
            <h1>Jugadores Registrados en AlexPHGPDS</h1>
            <p>Explora los jugadores que forman parte de nuestra comunidad.</p>
        </div>
    </header>

    <!-- Sección de jugadores -->
    <section class="players-section">
        <h2>Lista de Jugadores</h2>
        <div class="player-list">
            <!-- Aquí puedes agregar tarjetas de jugadores -->
            <div class="player-card">
                <h3>Jugador: Leo</h3>
                <p>ID: 001</p>
            </div>
            <div class="player-card">
                <h3>Jugador: Zara</h3>
                <p>ID: 002</p>
            </div>
            <!-- Añade más jugadores aquí -->
        </div>
    </section>

    <!-- Pie de página -->
    <footer>
        <p>&copy; 2024 AlexPHGPDS. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
