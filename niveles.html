<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Niveles - AlexPHGPDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos generales */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e2f;
            color: #fff;
        }

        h1, h2 {
            color: #ff7f50;
        }

        p, a {
            color: #eee;
        }

        a {
            text-decoration: none;
        }

        /* Estilo de la sección de niveles */
        .niveles-container {
            padding: 50px;
            text-align: center;
        }

        .nivel {
            background-color: #2f2f4f;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .nivel:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

    </style>
</head>
<body>

    <header>
        <h1>Niveles Disponibles en AlexPHGPDS</h1>
        <p>Aquí encontrarás todos los niveles creados por la comunidad</p>
    </header>

    <section class="niveles-container">
        <article class="nivel">
            <h2>Nivel 1: The Beginning</h2>
            <p>Dificultad: Fácil</p>
            <p>Creado por: Usuario1</p>
        </article>
        <article class="nivel">
            <h2>Nivel 2: The Challenge</h2>
            <p>Dificultad: Difícil</p>
            <p>Creado por: Usuario2</p>
        </article>
        <!-- Más niveles se podrán añadir aquí dinámicamente -->
    </section>

</body>
</html>
