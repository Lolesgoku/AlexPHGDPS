<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Niveles</title>
</head>
<body>
    <h1>Lista de Niveles</h1>
    <div id="niveles"></div> <!-- Aquí se mostrarán los niveles -->
    
    <script>
        fetch('niveles.php') // Carga el archivo PHP que contiene la lógica
            .then(response => response.text()) // Convierte la respuesta a texto
            .then(data => {
                document.getElementById('niveles').innerHTML = data; // Muestra los datos en la página
            });
    </script>
</body>
</html>
