<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro / Iniciar Sesión - AlexPHGPDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e2f;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1 {
            color: #ff7f50;
        }
        form {
            background-color: #2f2f4f;
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }
        input[type="submit"] {
            background-color: #ff7f50;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }
        input[type="submit"]:hover {
            background-color: #e67e22;
        }
        .toggle-form {
            text-align: center;
            margin-top: 10px;
        }
        .toggle-form a {
            color: #ff7f50;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <h1>Registro / Iniciar Sesión</h1>

    <!-- Formulario de registro -->
    <form id="register-form">
        <h2>Registro</h2>
        <input type="text" id="username" placeholder="Nombre de usuario" required>
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <input type="submit" value="Registrarse">
    </form>

    <!-- Formulario de inicio de sesión -->
    <form id="login-form" style="display:none;">
        <h2>Iniciar Sesión</h2>
        <input type="text" id="login-username" placeholder="Nombre de usuario" required>
        <input type="password" id="login-password" placeholder="Contraseña" required>
        <input type="submit" value="Iniciar Sesión">
    </form>

    <div class="toggle-form">
        <a href="#" id="toggle-link">¿Ya tienes una cuenta? Inicia sesión aquí.</a>
    </div>

    <script>
        const toggleLink = document.getElementById('toggle-link');
        const registerForm = document.getElementById('register-form');
        const loginForm = document.getElementById('login-form');

        toggleLink.addEventListener('click', function(e) {
            e.preventDefault();
            registerForm.style.display = registerForm.style.display === 'none' ? 'block' : 'none';
            loginForm.style.display = loginForm.style.display === 'none' ? 'block' : 'none';
            toggleLink.innerText = registerForm.style.display === 'none' ? '¿No tienes una cuenta? Regístrate aquí.' : '¿Ya tienes una cuenta? Inicia sesión aquí.';
        });
    </script>
</body>
</html>
