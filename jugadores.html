<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Perfil del Jugador - AlexPHGPDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e2f;
            color: #fff;
        }

        .perfil-container {
            width: 80%;
            margin: 50px auto;
            background-color: #2f2f4f;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .perfil-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .perfil-header h1 {
            font-size: 2.5em;
            color: #ff7f50;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .stats div {
            background-color: #444;
            padding: 20px;
            border-radius: 15px;
            width: 120px;
            text-align: center;
        }

        .icons {
            margin-top: 30px;
        }

        .icon {
            display: inline-block;
            background-color: #333;
            padding: 10px;
            margin: 10px;
            border-radius: 15px;
        }

        .icon img {
            max-width: 50px;
        }

    </style>
</head>
<body>

    <div class="perfil-container">
        <div class="perfil-header">
            <h1>Nombre del Jugador: LOLESCO</h1>
            <span>Global Rank: 2</span>
        </div>

        <!-- Estadísticas del jugador -->
        <div class="stats">
            <div>
                <h3>Estrellas</h3>
                <p>0</p>
            </div>
            <div>
                <h3>Monedas Doradas</h3>
                <p>0</p>
            </div>
            <div>
                <h3>Monedas Plateadas</h3>
                <p>0</p>
            </div>
            <div>
                <h3>Demonios</h3>
                <p>0</p>
            </div>
        </div>

        <!-- Iconos desbloqueados -->
        <div class="icons">
            <h2>Iconos Desbloqueados</h2>
            <div class="icon"><img src="cube.png" alt="Cube Icon"></div>
            <div class="icon"><img src="ship.png" alt="Ship Icon"></div>
            <div class="icon"><img src="ball.png" alt="Ball Icon"></div>
            <div class="icon"><img src="ufo.png" alt="UFO Icon"></div>
            <div class="icon"><img src="wave.png" alt="Wave Icon"></div>
            <div class="icon"><img src="robot.png" alt="Robot Icon"></div>
            <div class="icon"><img src="spider.png" alt="Spider Icon"></div>
        </div>
    </div>

</body>
</html>
