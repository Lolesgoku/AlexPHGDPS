<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jugadores</title>
</head>
<body>
    <h1>Lista de Jugadores</h1>
    <div id="jugadores"></div> <!-- Aquí se mostrarán los jugadores -->
    
    <script>
        fetch('jugadores.php') // Carga el archivo PHP que contiene la lógica
            .then(response => response.text()) // Convierte la respuesta a texto
            .then(data => {
                document.getElementById('jugadores').innerHTML = data; // Muestra los datos en la página
            });
    </script>
</body>
</html>
