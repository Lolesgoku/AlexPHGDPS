<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Jugadores - AlexPHGPDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos generales */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1e1e2f;
            color: #fff;
        }

        h1, h2 {
            color: #ff7f50;
        }

        p, a {
            color: #eee;
        }

        a {
            text-decoration: none;
        }

        /* Tabla de jugadores */
        table {
            width: 80%;
            margin: 50px auto;
            background-color: #333;
            color: white;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #444;
        }

        th {
            background-color: #444;
        }

        tr:hover {
            background-color: #555;
        }

    </style>
</head>
<body>

    <header>
        <h1>Jugadores de AlexPHGPDS</h1>
        <p>Lista de jugadores registrados en el servidor</p>
    </header>

    <section class="jugadores-container">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Nivel</th>
                    <th>Puntuación</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Jugador1</td>
                    <td>15</td>
                    <td>1200</td>
                </tr>
                <tr>
                    <td>Jugador2</td>
                    <td>10</td>
                    <td>900</td>
                </tr>
                <!-- Más jugadores se podrán añadir aquí dinámicamente -->
            </tbody>
        </table>
    </section>

</body>
</html>
